name: Deploy Profile

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - '.deploy/root.htaccess'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

concurrency:
  group: profile-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy imcenix.com
    runs-on: ubuntu-latest
    env:
      SITE_DOMAIN: imcenix.com
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to /site
        run: |
          set -euo pipefail
          ROOT_DIR="${SFTP_REMOTE_PATH%/}"
          SITE_DIR="$ROOT_DIR/site"
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" <<LFTP
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mkdir -p "$SITE_DIR"
          mirror --reverse --verbose --delete --parallel=4 \
            --exclude-glob .DS_Store \
            --exclude-glob *.log \
            dist/ "$SITE_DIR"
          put -O "$ROOT_DIR" .deploy/root.htaccess
          rm -f "$ROOT_DIR/.htaccess"
          mv "$ROOT_DIR/root.htaccess" "$ROOT_DIR/.htaccess"
          chmod -R 755 "$SITE_DIR"
          bye
          LFTP
